<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif; background: #faf8ef; margin: 0; color: #776e65; }
h1 { font-size: 60px; margin: 0 0 20px 0; }
#grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #bbada0; padding: 10px; border-radius: 6px; touch-action: none; }
.cell { width: 80px; height: 80px; background: #cdc1b4; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 36px; font-weight: bold; transition: 100ms ease-in-out; }
.cell[data-val="2"] { background: #eee4da; }
.cell[data-val="4"] { background: #ede0c8; }
.cell[data-val="8"] { background: #f2b179; color: #f9f6f2; }
.cell[data-val="16"] { background: #f59563; color: #f9f6f2; }
.cell[data-val="32"] { background: #f67c5f; color: #f9f6f2; }
.cell[data-val="64"] { background: #f65e3b; color: #f9f6f2; }
.cell[data-val="128"] { background: #edcf72; color: #f9f6f2; font-size: 30px; }
.cell[data-val="256"] { background: #edcc61; color: #f9f6f2; font-size: 30px; }
.cell[data-val="512"] { background: #edc850; color: #f9f6f2; font-size: 30px; }
.cell[data-val="1024"] { background: #edc53f; color: #f9f6f2; font-size: 24px; }
.cell[data-val="2048"] { background: #edc22e; color: #f9f6f2; font-size: 24px; }
@media (max-width: 420px) {
  .cell { width: 65px; height: 65px; font-size: 28px; }
  .cell[data-val="1024"], .cell[data-val="2048"] { font-size: 18px; }
  h1 { font-size: 44px; }
}
.guide { margin-top: 25px; font-size: 16px; color: #8f7a66; }
</style>
</head>
<body>
<h1>2048</h1>
<div id="grid"></div>
<div class="guide">Use arrow keys or swipe (touch) to play</div>
<script>
let board = Array(16).fill(0);
const grid = document.getElementById("grid");

const randomTile = () => {
    let empty = board.map((v, i) => v === 0 ? i : -1).filter(v => v !== -1);
    if(empty.length) board[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
}

const render = () => {
    grid.innerHTML = board.map(v => `<div class="cell" data-val="${v}">${v || ""}</div>`).join("");
}

const slide = (row) => {
    let f = row.filter(v => v);
    for(let i=0; i<f.length-1; i++) {
        if(f[i] === f[i+1]) { f[i] *= 2; f[i+1] = 0; }
    }
    f = f.filter(v => v);
    while(f.length < 4) f.push(0);
    return f;
}

const move = (key) => {
    let old = [...board];
    if(key === "ArrowLeft") for(let i=0; i<16; i+=4) board.splice(i, 4, ...slide(board.slice(i, i+4)));
    if(key === "ArrowRight") for(let i=0; i<16; i+=4) board.splice(i, 4, ...slide(board.slice(i, i+4).reverse()).reverse());
    if(key === "ArrowUp") for(let c=0; c<4; c++) { let k = slide([board[c], board[c+4], board[c+8], board[c+12]]); [board[c], board[c+4], board[c+8], board[c+12]] = k; }
    if(key === "ArrowDown") for(let c=0; c<4; c++) { let k = slide([board[c+12], board[c+8], board[c+4], board[c]]); [board[c+12], board[c+8], board[c+4], board[c]] = k.reverse(); }
    if(board.some((v, i) => v !== old[i])) { randomTile(); render(); }
}

randomTile(); randomTile(); render();

document.addEventListener("keydown", e => {
    if(["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(e.key)) {
        e.preventDefault();
        move(e.key);
    }
}, { passive: false });

let tsX, tsY;
grid.addEventListener('touchstart', e => { 
    tsX = e.touches[0].clientX; 
    tsY = e.touches[0].clientY; 
}, {passive: true});

grid.addEventListener('touchend', e => {
    if(!tsX || !tsY) return;
    let teX = e.changedTouches[0].clientX, teY = e.changedTouches[0].clientY;
    let dx = teX - tsX, dy = teY - tsY;
    if(Math.abs(dx) > Math.abs(dy)) {
        if(Math.abs(dx) > 30) move(dx > 0 ? "ArrowRight" : "ArrowLeft");
    } else {
        if(Math.abs(dy) > 30) move(dy > 0 ? "ArrowDown" : "ArrowUp");
    }
    tsX = tsY = null;
}, {passive: true});

// 防止页面滚动以便顺利滑动游玩
grid.addEventListener('touchmove', e => {
    e.preventDefault();
}, {passive: false});

</script>
</body>
</html>
